<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - Deep Bando</title>
<meta name="description" content="Tools built by Deep Bando — PDF Studio, Case Gym, Super Cards.">
<link rel="canonical" href="https://quizzito.github.io/deepbando.github.io/products.html">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--ink:oklch(14% 0.012 240);--ink-2:oklch(35% 0.015 240);--ink-3:oklch(55% 0.01 240);--surface:oklch(98% 0.004 240);--surface-2:oklch(95% 0.006 240);--gold:oklch(62% 0.12 85);--gold-light:oklch(93% 0.03 85);--gold-dark:oklch(40% 0.10 85);--teal:oklch(52% 0.11 195);--teal-light:oklch(93% 0.03 195);--teal-dark:oklch(34% 0.09 195);--border:oklch(88% 0.008 240);--serif:"Playfair Display",Georgia,serif;--sans:"DM Sans",system-ui,sans-serif;--r-sm:6px;--r-md:12px;--r-lg:18px;--r-pill:40px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}body{font-family:var(--sans);background:var(--surface);color:var(--ink);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}img{max-width:100%;display:block;}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:0.5px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;}
.nav-logo{font-family:var(--serif);font-size:17px;font-weight:500;letter-spacing:-.01em;color:var(--ink);}
.nav-links{display:flex;align-items:center;gap:28px;}
.nav-link{font-family:var(--sans);font-size:13.5px;color:var(--ink-3);transition:color .18s;}
.nav-link:hover,.nav-link.active{color:var(--ink);}
.nav-cta{font-size:13px;font-weight:500;color:var(--gold-dark);border:1px solid var(--gold);padding:7px 20px;border-radius:var(--r-pill);transition:background .18s,transform .12s;}
.nav-cta:hover{background:var(--gold-light);transform:translateY(-1px);}
.footer{display:flex;align-items:center;justify-content:space-between;padding:26px 40px;background:var(--surface-2);border-top:0.5px solid var(--border);flex-wrap:wrap;gap:16px;}
.footer-brand{font-family:var(--serif);font-size:14px;color:var(--ink-2);}
.footer-links{display:flex;align-items:center;gap:22px;flex-wrap:wrap;}
.footer-link{font-family:var(--sans);font-size:13px;color:var(--ink-3);transition:color .18s;}
.footer-link:hover{color:var(--ink);}
.footer-copy{font-family:var(--sans);font-size:12px;color:var(--ink-3);}
@media(prefers-reduced-motion:no-preference){.anim{opacity:0;transform:translateY(18px);transition:opacity .55s cubic-bezier(.22,1,.36,1),transform .55s cubic-bezier(.22,1,.36,1);}.anim.in{opacity:1;transform:none;}.anim-d1{transition-delay:.08s;}.anim-d2{transition-delay:.16s;}}
.page-wrap{max-width:860px;margin:0 auto;padding:5rem 40px 4rem;}
.eyebrow{font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-dark);background:var(--gold-light);padding:5px 14px;border-radius:var(--r-pill);display:inline-block;margin-bottom:1.25rem;}
.page-title{font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);font-weight:500;letter-spacing:-.025em;line-height:1.18;color:var(--ink);margin-bottom:.875rem;}
.page-sub{font-family:var(--sans);font-size:16px;font-weight:300;color:var(--ink-3);max-width:520px;line-height:1.7;margin-bottom:3rem;}
.cat-section{padding:3rem 0;border-bottom:0.5px solid var(--border);}
.cat-section:last-of-type{border-bottom:none;padding-bottom:0;}
.cat-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.75rem;}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cat-label{font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);}
.cat-line{flex:1;height:0.5px;background:var(--border);}
.product-row{display:grid;grid-template-columns:1fr auto;gap:2rem;align-items:center;padding:1.5rem 0;border-bottom:0.5px solid var(--border);}
.product-row:last-child{border-bottom:none;}
.product-name{font-family:var(--serif);font-size:1.2rem;font-weight:500;color:var(--ink);margin-bottom:.375rem;transition:color .18s;}
.product-row:hover .product-name{color:var(--gold-dark);}
.product-summary{font-family:var(--sans);font-size:14px;font-weight:300;color:var(--ink-3);line-height:1.65;max-width:520px;}
.product-btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:9px 22px;border-radius:var(--r-pill);white-space:nowrap;transition:transform .15s,box-shadow .15s;display:inline-block;color:#fff;}
.product-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px -4px rgba(0,0,0,.22);}
.btn-Productivity{background:var(--gold-dark);}
.btn-Decision{background:var(--teal-dark);}
.btn-Finance{background:var(--ink);}
.load-msg{font-family:var(--sans);font-size:14px;color:var(--ink-3);padding:2rem 0;}
@media(max-width:700px){.nav{padding:16px 20px;}.nav-link:not(.nav-cta){display:none;}.page-wrap{padding:3.5rem 20px;}.product-row{grid-template-columns:1fr;gap:1rem;}.footer{padding:22px 20px;flex-direction:column;align-items:flex-start;}}
</style>
</head>
<body>
<header><nav class="nav" aria-label="Main navigation"><a href="index.html" class="nav-logo">Deep Bando</a><div class="nav-links"><a href="essays.html" class="nav-link">Essays</a><a href="products.html" class="nav-link active">Products</a><a href="about.html" class="nav-link">About</a><a href="https://www.linkedin.com/in/deepban/" target="_blank" rel="noopener noreferrer" class="nav-link nav-cta">Work with me</a></div></nav></header>
<div class="page-wrap">
  <span class="eyebrow">Built &amp; Shipped</span>
  <h1 class="page-title">Products</h1>
  <p class="page-sub">Tools I have built, mostly to scratch my own itch. Free and open where possible.</p>
  <div id="products-container"><p class="load-msg">Loading&hellip;</p></div>
</div>
<footer class="footer"><span class="footer-brand">Deep Bando &middot; Decision Management</span><nav class="footer-links"><a href="https://www.linkedin.com/in/deepban/" class="footer-link" target="_blank">LinkedIn</a><a href="https://github.com/quizzito" class="footer-link" target="_blank">GitHub</a><a href="#" class="footer-link">Twitter / X</a><a href="#" class="footer-link">Subscribe</a></nav><span class="footer-copy">&copy; 2025</span></footer>
<script>
var CATS={"Productivity":"var(--gold)","Decision Making":"var(--teal)","Finance":"var(--ink)"};
var BTNS={"Productivity":"btn-Productivity","Decision Making":"btn-Decision","Finance":"btn-Finance"};
fetch("data/products.json")
  .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
  .then(function(prods){
    var order=[],g={};
    prods.forEach(function(p){if(!g[p.category]){g[p.category]=[];order.push(p.category);}g[p.category].push(p);});
    document.getElementById("products-container").innerHTML=order.map(function(cat){
      var dot=CATS[cat]||"var(--ink-3)";
      var btn=BTNS[cat]||"btn-Finance";
      return "<div class='cat-section anim'><div class='cat-header'><div class='cat-dot' style='background:"+dot+"'></div><span class='cat-label'>"+cat+"</span><div class='cat-line'></div></div>"+
        g[cat].map(function(p){return "<div class='product-row'><div><div class='product-name'>"+p.name+"</div><div class='product-summary'>"+p.summary+"</div></div><a href='"+p.url+"' target='_blank' class='product-btn "+btn+"'>"+p.cta+" &rarr;</a></div>";}).join("")+"</div>";
    }).join("");
    if("IntersectionObserver" in window&&!window.matchMedia("(prefers-reduced-motion:reduce)").matches){
      var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");obs.unobserve(e.target);}});},{threshold:0.1,rootMargin:"0px 0px -40px 0px"});
      document.querySelectorAll(".anim").forEach(function(el){obs.observe(el);});
    } else { document.querySelectorAll(".anim").forEach(function(el){el.classList.add("in");}); }
  })
  .catch(function(){document.getElementById("products-container").innerHTML="<p class='load-msg'>Could not load products. Use VS Code Go Live to test locally.</p>";});
</script>
<script>
(function(){
  var b=document.createElement("div");b.setAttribute("aria-hidden","true");
  b.style.cssText="position:fixed;top:0;left:0;height:2px;background:oklch(62% 0.12 85);width:0%;z-index:9999;pointer-events:none;transition:width .1s linear";
  document.body.appendChild(b);
  window.addEventListener("scroll",function(){b.style.width=Math.min(100,window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)*100)+"%";},{passive:true});
  if(!("IntersectionObserver" in window))return;
  if(window.matchMedia("(prefers-reduced-motion:reduce)").matches)return;
  var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add("in");obs.unobserve(e.target);}});},{threshold:0.1,rootMargin:"0px 0px -48px 0px"});
  document.querySelectorAll(".anim").forEach(function(el){obs.observe(el);});
})();
</script>
<script>
/* ── BACK TO TOP + CHIP DELIGHT ──────────────────────────────── */
(function(){
  var top=document.createElement("button");
  top.innerHTML="&#8593;";top.setAttribute("aria-label","Back to top");
  top.style.cssText="position:fixed;bottom:28px;right:28px;width:42px;height:42px;border-radius:50%;background:var(--ink);color:var(--surface);border:none;font-size:16px;cursor:pointer;opacity:0;z-index:90;transition:opacity 0.3s cubic-bezier(.22,1,.36,1),transform 0.3s cubic-bezier(.22,1,.36,1);transform:translateY(8px);font-family:var(--sans);";
  document.body.appendChild(top);
  window.addEventListener("scroll",function(){var s=window.scrollY>400;top.style.opacity=s?"1":"0";top.style.transform=s?"translateY(0)":"translateY(8px)";},{passive:true});
  top.addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"});});
  /* Chip click micro-feedback */
  document.querySelectorAll(".chip").forEach(function(c){
    c.addEventListener("click",function(){
      c.style.transform="scale(0.9)";
      setTimeout(function(){c.style.transform="";},110);
    });
  });
})();
</script>
</body>
</html>
